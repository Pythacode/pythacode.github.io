<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
	<title>C.V. Petit--Frulio Titouan</title>
    <script src="/res/js/contact.js" defer></script>
    <script src="/res/js/quill.min.js" defer></script>
    <script src="/res/js/maj.js" type="module" defer></script>
    <link rel="stylesheet" type="text/css" href="/res/css/index.css">
    <link rel="stylesheet" type="text/css" href="/res/css/contact.css">
    <link rel="stylesheet" type="text/css" href="/res/css/nav-button.css">
	<link rel="icon" href="/res/img/square-picture.jpg" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.6/quill.snow.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
	<header>
		<h2>Formulaire de contact</h2>
	</header>

	<form id="contactForm">
        <div class="champ">
            <label for="mail">Votre E-mail</label>
            <input type="email" id="mail" placeholder="Votre e-mail" required></input>
        </div>
        <div class="champ">
            <label for="name">Votre nom</label>
            <input type="text" id="name" placeholder="Votre nom" required></input>
        </div>
        <div class="champ">
            <label for="subject">Votre sujet</label>
            <input type="text" id="subject" placeholder="Votre sujet" required></input>
        </div>
        <div class="champ">
            <label>Votre message</label>
            <div id="message"></div>
            <span class="propulser">Propulsé par <a href="https://www.quilljs.com" target="blank_">QuillJs</a></span>
        </div>
        <input type="submit", id="submit" value="Valider"/>
        <p class="champRequisI">Tous les champs marqués sont requis<br>Vos informations me serons transmises par mail via <a href="https://www.emailjs.com/">EmailJS</a></p>
	</form>

    <nav>
        <span data-i18n="see-more" class="skeleton-load"></span>
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 10L12 16L18 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </nav>

    <footer>
        <script src="/res/js/fetch-footer.js" defer></script>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                fetch_footer();
            });
        </script>
    </footer>

</body>
</html>
